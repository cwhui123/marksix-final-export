name: Auto Update Mark Six Data

on:
  schedule:
    - cron: "0 0 * * *"   # 每日 08:00 HKT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests beautifulsoup4 pandas openpyxl

      - run: python fetch_marksix.py

      - name: Write last update time (HKT)
        run: |
          echo "最後更新時間（香港時間 HKT, GMT+8）：$(TZ=Asia/Hong_Kong date '+%Y-%m-%d %H:%M')" > last_update.txt

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.xlsx last_update.txt
          git commit -m "Auto update Mark Six data" || echo "No changes"
          git push
